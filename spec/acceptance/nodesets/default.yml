<%
  hypervisor = ENV.fetch('BEAKER_HYPERVISOR', 'vagrant_libvirt')
-%>
HOSTS:
  alma10:
    roles:
      - default
    platform: el-10-x86_64
    box: almalinux/10
    hypervisor: <%= hypervisor %>

CONFIG:
  log_level: verbose
  type: aio
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
